<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My GitHub Test Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: #f4f4f4;
            text-align: center;
        }
        header {
            background: #333;
            color: #fff;
            padding: 1rem 0;
        }
        main {
            padding: 2rem;
        }
        .card {
            background: #fff;
            padding: 1.5rem;
            margin: 1rem auto;
            max-width: 400px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        button {
            padding: 10px 20px;
            border: none;
            background: #007BFF;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>

<header>
    <h1>🚀 My GitHub Test Page</h1>
</header>

<main>
    <div class="card">
        <h2>Hello, World!</h2>
        <p>This is my first GitHub Pages test.</p>
        <button onclick="showMessage()">Click Me</button>
    </div>
</main>

<script>
    function showMessage() {
        alert('It works! 🎉');
    }
</script>

</body>
</html>
